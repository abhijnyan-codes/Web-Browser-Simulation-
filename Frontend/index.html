<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="browser">

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active">Tab 1 ✕</div>
            <div class="tab">Tab 2 ✕</div>
            <div class="add-tab">+</div>
        </div>

        
        <div class="navbar">
            <button class="nav-btn">←</button>
            <button class="nav-btn">→</button>
            <button class="nav-btn">⟳</button>

            <input type="text" class="address-bar" placeholder="Enter URL...">
        </div>

        
        <div class="content">
            <div class="page html">
                <h1>Welcome</h1>
                <p>This is a simulated HTML page.</p>
            </div>
        </div>

    </div>

</body>
</html>
