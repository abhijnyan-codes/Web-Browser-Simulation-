<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="browser">

    <!-- Tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Navbar -->
    <div class="navbar">
        <button id="back" class="nav-btn">←</button>
        <button id="forward" class="nav-btn">→</button>
        <button id="refresh" class="nav-btn">⟳</button>

        <input type="text" id="addressBar" class="address-bar" placeholder="Enter URL...">
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>

</div>

<script src="index.js"></script>
</body>
</html>
